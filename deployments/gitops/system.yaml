apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  source:
    path: deployments/applications/system
    repoURL: https://github.com/ian-cq/homelab
    targetRevision: HEAD
    kustomize:
      namePrefix: quanianitis.in-cluster.system.
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
