apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: services
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  source:
    path: deployments/applications/services
    repoURL: https://github.com/ian-cq/homelab
    targetRevision: HEAD
    kustomize:
      namePrefix: quanianitis.in-cluster.services.
  project: default
  syncPolicy:
    automated: 
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
