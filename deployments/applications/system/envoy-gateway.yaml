apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: gateway
    server: https://kubernetes.default.svc
  # Envoy Gateway's helm chart is published OCI-only on docker.io.
  # kustomize v5 helmCharts does not support OCI repos, so we use Argo's
  # native helm source directly instead of the kustomize+helm wrapper
  # pattern used by the rest of the repo (cert-manager, cilium, etc).
  source:
    repoURL: docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: v1.5.0
    helm:
      releaseName: eg
      # Install into the `gateway` namespace. The per-Gateway Envoy
      # data-plane Deployments + Services that Envoy Gateway provisions
      # for each accepted Gateway also land in this namespace by default,
      # so all Gateway machinery (controller + proxies) lives together.
      # The `eg` GatewayClass (cluster-scoped) is authored in
      # infra/kustomize/gateway/gatewayclass.yaml.
  project: default
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status
  syncPolicy:
    automated: null
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
