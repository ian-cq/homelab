apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: gateway
    server: https://kubernetes.default.svc
  # Envoy Gateway's helm chart is published OCI-only on docker.io.
  # kustomize v5 helmCharts does not support OCI repos, so we use Argo's
  # native helm source directly instead of the kustomize+helm wrapper
  # pattern used by the rest of the repo (cert-manager, cilium, etc).
  source:
    repoURL: docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: v1.5.0
    helm:
      releaseName: eg
  project: default
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
