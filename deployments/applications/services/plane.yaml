apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: plane
    server: https://kubernetes.default.svc
  source:
    path: infra/charts/plane
    repoURL: https://github.com/ian-cq/homelab.git
    targetRevision: HEAD
  project: default
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
