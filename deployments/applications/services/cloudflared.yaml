apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: cloudflared
    server: https://kubernetes.default.svc
  source:
    path: infra/charts/cloudflared
    repoURL: https://github.com/ian-cq/homelab.git
    targetRevision: HEAD
  project: default
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
