---
# Homelab inventory — single server (quanianitis-01)
# Run: ansible-playbook playbooks/site.yml -i inventory.yml
k3s_cluster:
  children:
    server:
      hosts:
        quanianitis-01:
          ansible_host: quanianitis-01  # Tailscale MagicDNS hostname
          ansible_user: quanianitis
    agent:
      hosts: {}  # add future nodes here

  vars:
    ansible_port: 22
    k3s_version: v1.32.2+k3s1
    token: "{{ lookup('env', 'K3S_TOKEN') }}"
    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}"
    extra_server_args: ""
    cluster_context: quanianitis
    user_kubectl: true

    # Homelab defaults: Traefik + servicelb + local-path enabled
    # GPU runtime configured separately via containerd config template
    server_config_yaml: |
      cluster-init: true
      tls-san:
          - 100.100.62.1
