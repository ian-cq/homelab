# frps — FRP server configuration
# Docs: https://github.com/fatedier/frp/blob/dev/doc/server_configures.md

bindAddr = "0.0.0.0"
bindPort = 7000

# NOTE: no vhostHTTPPort. Port 80 on the VPS is owned by the
# nginx-redirect compose stack (../nginx-redirect/) which returns
# 301 -> https://$host$request_uri. HTTPS is tunneled as a TCP proxy on
# :443 (see frp-client/frpc.toml) and terminates inside the cluster on
# the cilium gateway. frps never sees plaintext HTTP.

# Authentication
auth.method = "token"
auth.token = "CHANGE_ME"

# Dashboard — localhost only, access via SSH tunnel
webServer.addr = "127.0.0.1"
webServer.port = 7500
webServer.user = "admin"
webServer.password = "CHANGE_ME"

# TLS between frpc <-> frps control channel
transport.tls.force = true

# Allowed TCP proxy ports (whitelist only what you need)
allowPorts = [
  { start = 2222, end = 2222 },
]

# Logging
log.to = "console"
log.level = "info"
log.maxDays = 7
