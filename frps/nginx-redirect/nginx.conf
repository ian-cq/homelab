# HTTP -> HTTPS edge redirect.
#
# Sits on :80 of the VPS, in front of frps. Returns a permanent redirect
# to https://$host$request_uri for every request. TLS termination happens
# inside the cluster on the cilium gateway (port 443, tunneled via frps
# TCP proxy on 443).
#
# Health probe path /healthz is exempt so the container's healthcheck can
# verify the process without hitting the redirect.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Real client IP behind a non-trusted edge: we don't trust any X-Forwarded-*
    # because nginx itself IS the edge here.
    log_format edge '$remote_addr - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_user_agent" host=$host';
    access_log /var/log/nginx/access.log edge;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30s;
    server_tokens off;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Local healthcheck (no redirect).
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Everything else -> HTTPS, preserving host + path + query.
        location / {
            return 301 https://$host$request_uri;
        }
    }
}
