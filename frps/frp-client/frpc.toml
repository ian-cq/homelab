# frpc — FRP client configuration
# Docs: https://github.com/fatedier/frp/blob/dev/doc/client_configures.md

# Using the VPS IP directly. The DNS name 62a.quanianitis.com currently
# resolves to a different (IPv6) address; swap back to the hostname once
# the A record points at this IP.
serverAddr = "103.40.207.125"
serverPort = 7000

# Authentication — token loaded from environment via systemd EnvironmentFile
auth.method = "token"
auth.token = "{{ .Envs.FRP_AUTH_TOKEN }}"

# TLS for control channel
transport.tls.enable = true

# Logging
log.to = "console"
log.level = "info"
log.maxDays = 7

# --- Proxies ---
#
# Per-Host HTTP proxies on the FRP server's vhostHTTPPort (80).
# Each proxy registers a customDomain so the frps virtual-host router can
# pick the correct backend Service based on the Host header forwarded by
# Cloudflare.
#
# Backends are addressed via Service ClusterIPs. Cilium runs with
# kube-proxy-replacement=true and the ClusterIP CIDR (10.43.0.0/16) is
# reachable from the host network namespace, so frpc on the node can dial
# them directly without NodePorts.
#
# End-state plan: replace these N proxies with a single proxy pointing at a
# Cilium Gateway Service IP once GatewayClass + Gateway + HTTPRoutes are
# provisioned. See ~/Documents/docs/frp-tunnel.md.

# Argo CD (argocd-server, server.insecure=true)
[[proxies]]
name = "argocd"
type = "http"
customDomains = ["argocd.62a.quanianitis.com"]
localIP = "10.43.12.44"
localPort = 80

# Grafana
[[proxies]]
name = "grafana"
type = "http"
customDomains = ["grafana.62a.quanianitis.com"]
localIP = "10.43.144.146"
localPort = 80

# Prometheus
[[proxies]]
name = "prometheus"
type = "http"
customDomains = ["prometheus.62a.quanianitis.com"]
localIP = "10.43.120.72"
localPort = 80

# Kubernetes Dashboard (via kong gateway, plain HTTP listener)
[[proxies]]
name = "dashboard"
type = "http"
customDomains = ["dashboard.62a.quanianitis.com"]
localIP = "10.43.152.72"
localPort = 80

# TCP: SSH access to homelab
[[proxies]]
name = "ssh"
type = "tcp"
remotePort = 2222
localIP = "127.0.0.1"
localPort = 22
