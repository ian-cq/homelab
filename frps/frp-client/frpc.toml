# frpc — FRP client configuration
# Docs: https://github.com/fatedier/frp/blob/dev/doc/client_configures.md

# Using the VPS IP directly. The DNS name 62a.quanianitis.com currently
# resolves to a different (IPv6) address; swap back to the hostname once
# the A record points at this IP.
serverAddr = "103.40.207.125"
serverPort = 7000

# Authentication — token loaded from environment via systemd EnvironmentFile
auth.method = "token"
auth.token = "{{ .Envs.FRP_AUTH_TOKEN }}"

# TLS for control channel
transport.tls.enable = true

# Logging
log.to = "console"
log.level = "info"
log.maxDays = 7

# --- Proxies ---
#
# Single TCP passthrough proxy: VPS :443 → public Gateway ClusterIP :443.
# TLS terminates inside the cluster on the Gateway listener using
# cert-manager Let's Encrypt certs. frps just tunnels bytes; it does NOT
# need vhostHTTPSPort. SNI-based hostname routing happens inside the
# Gateway listener.
#
# Gateway controller: Envoy Gateway (gateway.envoyproxy.io). The per-
# Gateway data-plane proxy lives at gateway/envoy-gateway-public-<hash>;
# its ClusterIP is what we dial here. ClusterIP is stable as long as
# the Service is not recreated; the Service is recreated whenever the
# Gateway moves namespaces or is deleted, so this value needs refresh
# in lockstep with any Gateway-level structural change. Refresh with:
#   kubectl -n gateway get svc -l gateway.envoyproxy.io/owning-gateway-name=public \
#     -o jsonpath='{.items[0].spec.clusterIP}'

[[proxies]]
name = "gateway-https"
type = "tcp"
remotePort = 443
localIP = "10.43.201.212"
localPort = 443

# TCP: SSH access to homelab
[[proxies]]
name = "ssh"
type = "tcp"
remotePort = 2222
localIP = "127.0.0.1"
localPort = 22
