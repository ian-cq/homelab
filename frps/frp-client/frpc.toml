# frpc — FRP client configuration
# Docs: https://github.com/fatedier/frp/blob/dev/doc/client_configures.md

# Using the VPS IP directly. The DNS name 62a.quanianitis.com currently
# resolves to a different (IPv6) address; swap back to the hostname once
# the A record points at this IP.
serverAddr = "103.40.207.125"
serverPort = 7000

# Authentication — token loaded from environment via systemd EnvironmentFile
auth.method = "token"
auth.token = "{{ .Envs.FRP_AUTH_TOKEN }}"

# TLS for control channel
transport.tls.enable = true

# Logging
log.to = "console"
log.level = "info"
log.maxDays = 7

# --- Proxies ---

# HTTP wildcard: all *.62a.quanianitis.com traffic → Cilium Gateway
# (Gateway API HTTPRoutes select on Host header and route to k8s Services)
#
# NOTE: Cilium Gateway API is enabled in cilium-config (enable-gateway-api=true)
# and the Gateway API CRDs are installed, but no GatewayClass / Gateway
# resource exists yet. localIP points at loopback so the proxy registers
# successfully; HTTP requests will fail until a backend binds 127.0.0.1:80
# (replace with the Cilium-managed Gateway Service IP once the Gateway is
# created — `kubectl get svc -l gateway.networking.k8s.io/gateway-name=<name>`).
[[proxies]]
name = "web"
type = "http"
customDomains = ["*.62a.quanianitis.com"]
localIP = "127.0.0.1"
localPort = 80

# TCP: SSH access to homelab
[[proxies]]
name = "ssh"
type = "tcp"
remotePort = 2222
localIP = "127.0.0.1"
localPort = 22
