# frpc — FRP client configuration
# Docs: https://github.com/fatedier/frp/blob/dev/doc/client_configures.md

# Using the VPS IP directly. The DNS name 62a.quanianitis.com currently
# resolves to a different (IPv6) address; swap back to the hostname once
# the A record points at this IP.
serverAddr = "103.40.207.125"
serverPort = 7000

# Authentication — token loaded from environment via systemd EnvironmentFile
auth.method = "token"
auth.token = "{{ .Envs.FRP_AUTH_TOKEN }}"

# TLS for control channel
transport.tls.enable = true

# Logging
log.to = "console"
log.level = "info"
log.maxDays = 7

# --- Proxies ---

# HTTP wildcard: all *.62a.quanianitis.com traffic → Cilium Gateway
# (Gateway API HTTPRoutes select on Host header and route to k8s Services)
#
# INTERIM: Cilium Gateway API is enabled in cilium-config but no
# GatewayClass / Gateway / LB-IPAM is provisioned yet, so there is no
# Host-aware ingress on the cluster. Pointing directly at argocd-server
# (NodePort 30080, server.insecure=true) so argocd.62a.quanianitis.com
# reaches argocd end-to-end. Side effect: every *.62a host currently
# resolves to argocd. Replace with the Cilium Gateway Service IP once
# `kubectl get gateway -A` returns a real Gateway resource.
[[proxies]]
name = "web"
type = "http"
customDomains = ["*.62a.quanianitis.com"]
localIP = "127.0.0.1"
localPort = 30080

# TCP: SSH access to homelab
[[proxies]]
name = "ssh"
type = "tcp"
remotePort = 2222
localIP = "127.0.0.1"
localPort = 22
