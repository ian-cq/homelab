# frpc — FRP client configuration
# Docs: https://github.com/fatedier/frp/blob/dev/doc/client_configures.md

# Using the VPS IP directly. The DNS name 62a.quanianitis.com currently
# resolves to a different (IPv6) address; swap back to the hostname once
# the A record points at this IP.
serverAddr = "103.40.207.125"
serverPort = 7000

# Authentication — token loaded from environment via systemd EnvironmentFile
auth.method = "token"
auth.token = "{{ .Envs.FRP_AUTH_TOKEN }}"

# TLS for control channel
transport.tls.enable = true

# Logging
log.to = "console"
log.level = "info"
log.maxDays = 7

# --- Proxies ---
#
# Single TCP passthrough proxy: VPS :443 → Cilium Gateway ClusterIP :443.
# TLS terminates inside the cluster on the Gateway listener using
# cert-manager Let's Encrypt certs. frps just tunnels bytes; it does NOT
# need vhostHTTPSPort. SNI-based hostname routing happens inside the
# Gateway listeners.
#
# The Gateway Service is type=LoadBalancer but k3s is started with
# --disable=servicelb so it stays at <pending> external IP. ClusterIP is
# reachable from the node host network thanks to Cilium socket-LB.

[[proxies]]
name = "gateway-https"
type = "tcp"
remotePort = 443
# Cilium Gateway 'public' in the gateway namespace.
# Service: gateway/cilium-gateway-public (ClusterIP, port 443).
# NOTE: ClusterIP is stable unless the Service object is deleted, but
# the host network can't easily resolve cluster.local DNS, so we hard-
# code the IP. If the Gateway Service is ever recreated, refresh this
# value with:
#   kubectl -n gateway get svc cilium-gateway-public -o jsonpath='{.spec.clusterIP}'
localIP = "10.43.35.109"
localPort = 443

# TCP: SSH access to homelab
[[proxies]]
name = "ssh"
type = "tcp"
remotePort = 2222
localIP = "127.0.0.1"
localPort = 22
