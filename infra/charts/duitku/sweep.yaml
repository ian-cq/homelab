# duitku sweep CronJob.
#
# Every 15 minutes: walk /landing/{bank}/inbox/, parse each file,
# normalise, dedup, and post to Firefly III. Today this is a stub - the
# parsers aren't wired yet, so the job logs "no parsers wired" and
# exits 0. Standing the schedule up early ensures the cron, RBAC, PVC
# mount, configmap mount, and Secret mount are all proven before
# parser code lands.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: duitku-sweep
  labels:
    app.kubernetes.io/name: duitku
    app.kubernetes.io/component: sweep
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: duitku
            app.kubernetes.io/component: sweep
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
          containers:
            - name: sweep
              image: docker.io/library/duitku:0.3.0
              imagePullPolicy: Never
              args:
                - sweep
                - --landing-dir=/landing
                - --passwords-file=/etc/duitku/passwords.toml
                - --accounts-file=/etc/duitku/accounts.yaml
              env:
                - name: DUITKU_LOG_LEVEL
                  value: INFO
                - name: FIREFLY_PAT
                  valueFrom:
                    secretKeyRef:
                      name: duitku
                      key: FIREFLY_PAT
                      optional: true
              volumeMounts:
                - name: landing
                  mountPath: /landing
                - name: passwords
                  mountPath: /etc/duitku/passwords.toml
                  subPath: passwords.toml
                  readOnly: true
                - name: accounts
                  mountPath: /etc/duitku/accounts.yaml
                  subPath: accounts.yaml
                  readOnly: true
                # Python's pdfplumber/pikepdf (phase 1) and Starlette
                # both spool to /tmp under load. readOnlyRootFs is on,
                # so /tmp needs an emptyDir.
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 1000m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: landing
              persistentVolumeClaim:
                claimName: duitku-landing
            - name: passwords
              configMap:
                name: duitku-passwords
            - name: accounts
              configMap:
                name: duitku-accounts
            - name: tmp
              emptyDir:
                sizeLimit: 256Mi
