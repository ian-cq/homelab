# duitku secrets, inline for now.
#
# WEBHOOK_HMAC_KEY removed in 0.3.0: the receiver no longer validates
# HMAC. Auth is enforced at the Envoy Gateway via the apiKeyAuth
# SecurityPolicy (see securitypolicy.yaml + api-key-secret.yaml). The
# CF Email Worker presents X-API-Key directly.
#
# FIREFLY_PAT is a Firefly III Personal Access Token issued from the
# Firefly UI (Profile -> OAuth -> Personal Access Tokens). Used by the
# firefly emitter inside duitku-sweep. As of 0.4.0 the sweep CronJob
# *will* call Firefly on every run; an empty value here makes the
# CronJob fail fast at probe time with `FIREFLY_PAT not set`. That is
# the intended behaviour until the operator pastes a real token.
#
# Followup: migrate to ExternalSecret + 1Password Connect, same shape
# as the firefly stack.
apiVersion: v1
kind: Secret
metadata:
  name: duitku
  labels:
    app.kubernetes.io/name: duitku
type: Opaque
stringData:
  # Empty default. Populate with a real Firefly PAT and `kubectl apply`
  # (or commit + GitOps) before the next 15-minute sweep cron runs.
  FIREFLY_PAT: ""
