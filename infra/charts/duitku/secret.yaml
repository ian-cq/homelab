# duitku secrets, inline for now.
#
# WEBHOOK_HMAC_KEY is the shared secret with the Cloudflare Email
# Worker. The Worker's `WEBHOOK_HMAC_KEY` (set via `wrangler secret
# put`) must match the value here exactly. Rotating: update this
# Secret first -> roll the duitku-webhook Deployment -> update the
# Worker secret -> smoke-test. The brief window where they disagree
# yields 401s the Worker retries through; no data loss.
#
# FIREFLY_PAT is a Firefly III Personal Access Token issued from the
# Firefly UI (Profile -> OAuth -> Personal Access Tokens). Used by the
# firefly emitter inside duitku-sweep. Empty value is acceptable until
# parsers + emitter wire are landed (phase 1/2 in the design doc); the
# sweep stub today does not call Firefly.
#
# Followup: migrate to ExternalSecret + 1Password Connect, same shape
# as the firefly stack.
apiVersion: v1
kind: Secret
metadata:
  name: duitku
  labels:
    app.kubernetes.io/name: duitku
type: Opaque
stringData:
  # 32 random bytes, base64-encoded. Generated 2026-06-28.
  WEBHOOK_HMAC_KEY: "OIr+416MkSpyMA3U7xNxqTjMq1Ze0Ky86WAznp7Dw0M="
  # Empty until phase 2; the sweep stub does not call Firefly yet.
  FIREFLY_PAT: ""
