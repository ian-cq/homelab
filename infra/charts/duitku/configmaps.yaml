# Runtime configuration for duitku, mounted by the sweep CronJob.
#
# duitku-passwords: TOML list of PDF passwords to try in order. The
# binary tries each against an encrypted PDF until one decrypts.
# Plain ConfigMap (not Secret) per design-doc 2.5/5: these are PII but
# not auth secrets, namespace RBAC is the access boundary, and
# `kubectl edit configmap` is the routine maintenance verb. The
# binary actively redacts these strings from error sidecars and logs.
#
# duitku-accounts: YAML map of bank-side account_id -> Firefly asset
# account name. Required for every account being imported; missing
# entries cause the file to fail rather than guess a wrong target
# account.
apiVersion: v1
kind: ConfigMap
metadata:
  name: duitku-passwords
  labels:
    app.kubernetes.io/name: duitku
data:
  passwords.toml: |
    # /etc/duitku/passwords.toml
    # First successful decrypt wins; order does not matter semantically.
    # Add entries here as new bank PDFs need decoding.
    passwords = [
      # "780101",
      # "010178",
    ]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: duitku-accounts
  labels:
    app.kubernetes.io/name: duitku
data:
  accounts.yaml: |
    # /etc/duitku/accounts.yaml
    # Map account_id (as the parser surfaces it) to the EXACT Firefly
    # asset account name. account_id format is bank-specific; see the
    # parser docstrings in github.com/ian-cq/duitku.
    maybank:
      # "1234": "Maybank Savings ****1234"
    uob:
      # "5678": "UOB One ****5678"
    ryt:
      # "9012": "Ryt Bank ****9012"
