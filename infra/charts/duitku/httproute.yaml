# Gateway-API HTTPRoute for the duitku Cloudflare-Worker webhook.
#
# Attaches to the `inbox` listener of Gateway `public` (in `gateway`
# ns) via parentRefs.sectionName, which means this route inherits the
# listener-scoped `inbox-apikey` SecurityPolicy instead of the
# gateway-wide `public-oidc` (OAuth). The Cloudflare Email Worker
# presents X-API-Key; OIDC would block it.
#
# Hostname `inbox.62a.quanianitis.com` matches the inbox listener
# exactly. The wildcard `https` listener (`*.62a.quanianitis.com`)
# also covers this hostname, but per Gateway-API more-specific-wins,
# requests dispatch to `inbox` first. The sectionName attachment also
# ensures this route only appears under the inbox filter chain.
#
# TLS is the shared wildcard cert on the gateway side; this route
# exposes only /cf-inbox and /healthz - everything else 404s at envoy.
#
# Defence-in-depth: the duitku-webhook binary additionally enforces
# HMAC-SHA256 over (X-Duitku-Timestamp || "." || body) for replay
# protection. Edge api-key auth is necessary but not sufficient.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: duitku-inbox
  labels:
    app.kubernetes.io/name: duitku
    app.kubernetes.io/component: webhook
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: gateway
      sectionName: inbox
  hostnames:
    - inbox.62a.quanianitis.com
  rules:
    - matches:
        - path:
            type: Exact
            value: /cf-inbox
        - path:
            type: Exact
            value: /healthz
      backendRefs:
        - name: duitku-webhook
          port: 8080
