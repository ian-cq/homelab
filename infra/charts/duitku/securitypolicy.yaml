# Route-level SecurityPolicy that overrides the Gateway-wide
# `public-oidc` policy for the duitku-inbox HTTPRoute.
#
# Envoy Gateway resolves multiple SecurityPolicy attachments by
# specificity: a route-level SP wins over the Gateway-level one. Our
# Gateway-level SP requires Google OIDC + email allowlist on every
# attached route by default, but the Cloudflare Email Worker cannot
# present a Google JWT, so we use shared API-key auth instead.
#
# The API key is the gateway-level Secret `gateway-api-key` in the
# `gateway` namespace (see infra/kustomize/gateway/), referenced
# cross-namespace via the ReferenceGrant that lives alongside it.
# This SP rejects requests without a valid `X-API-Key` header at L7,
# before the duitku-webhook pod sees them. `sanitize: true` strips
# the header before forwarding to the upstream so the webhook never
# logs the credential. `forwardClientIDHeader` exposes the matched
# Secret-data key (e.g. `cf-worker`) to the upstream as
# `x-client-id` for audit logging.
#
# Defence-in-depth: the duitku-webhook ALSO enforces HMAC-SHA256 over
# (X-Duitku-Timestamp || "." || body) inside the pod. That gives us
# replay protection (5-minute timestamp window) and body integrity
# that static API keys lack. Removing the in-app HMAC and relying
# solely on edge API-key auth is a one-line follow-up if/when the
# replay-and-tamper threat is judged not in scope.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: duitku-inbox-apikey
  labels:
    app.kubernetes.io/name: duitku
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: duitku-inbox
  apiKeyAuth:
    credentialRefs:
      - group: ""
        kind: Secret
        name: gateway-api-key
    extractFrom:
      - headers:
          - X-API-Key
    forwardClientIDHeader: x-client-id
    sanitize: true
