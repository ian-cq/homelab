# duitku — Malaysian bank statement parser + Firefly III importer.
#
# The in-cluster deployment is the "phase 3" target of the design doc
# (see github.com/ian-cq/docs:duitku.md). Today's shape:
#
#   - duitku-webhook Deployment: HTTPS receiver invoked by the
#     Cloudflare Email Worker after Email Routing delivers a routed
#     statement. HMAC-validated multipart POSTs land in the landing
#     PVC at /landing/{bank}/inbox/.
#   - duitku-sweep CronJob: parses files in the inbox and posts to
#     Firefly III. Parsers are stubs in this phase; the CronJob runs
#     and exits cleanly until parsers land.
#   - duitku-prune CronJob: deletes processed/ files older than
#     --retention-days.
#
# Edge auth (X-API-Key) lives at the gateway: this chart's HTTPRoute
# attaches to the Gateway `public` listener `inbox` (in `gateway` ns),
# which has its own listener-scoped SecurityPolicy + shared Secret. See
# infra/kustomize/gateway/{securitypolicy-inbox,api-key-secret}.yaml.
# The duitku-webhook binary additionally enforces HMAC over the body
# for replay protection - api-key is necessary but not sufficient.
#
# Image: docker.io/library/duitku:0.2.0 - built locally with nerdctl +
# buildkit and loaded into the k3s containerd k8s.io namespace. As long
# as the cluster is single-node, no registry is needed
# (imagePullPolicy: Never). Migrating to ghcr.io/ian-cq/duitku once a
# GH token with write:packages scope is available is a followup.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secret.yaml
  - configmaps.yaml
  - pvc.yaml
  - webhook.yaml
  - httproute.yaml
  - sweep.yaml
  - prune.yaml
