# Shared API key for *.62a.quanianitis.com routes that bypass the
# Gateway-wide `public-oidc` SecurityPolicy (currently: duitku-inbox).
#
# The Cloudflare Email Worker — and any future machine-to-machine
# caller of an OIDC-exempt route — presents this key in the
# `X-API-Key` request header. Envoy Gateway's apiKeyAuth filter
# rejects requests at L7 before they reach the upstream pod, so the
# pod's per-request CPU budget is only spent on authenticated
# traffic.
#
# Format: each `stringData` key is a client identity that Envoy logs
# and forwards to the upstream via
# SecurityPolicy.apiKeyAuth.forwardClientIDHeader. Add new clients
# as new entries here; the matched client's key name is what shows up
# in EG access logs and the webhook's `x-client-id` request header.
#
# Namespace placement: this Secret lives in `duitku` namespace, NOT
# in `gateway` namespace, because Envoy Gateway v1.5.x rejects
# cross-namespace credentialRefs in apiKeyAuth even when a Gateway
# API ReferenceGrant permits it (EG admission error:
# "secret ref namespace must be unspecified/empty or duitku").
# When a second OIDC-exempt route lands in another namespace,
# duplicate this Secret into that namespace with the same key bytes,
# or front both copies with an ExternalSecret backed by a single
# 1Password Connect item.
#
# Rotation:
#   1. Mint a new key:
#        python3 -c 'import secrets; print(secrets.token_urlsafe(32))'
#   2. Add a SECOND entry to this Secret with the new key (don't
#      remove the old one yet). Commit + push + Argo sync.
#   3. Update the consumer (`wrangler secret put GATEWAY_API_KEY` for
#      the CF Worker) to use the new key. Verify traffic with the new
#      key is being accepted (EG logs will show the new client name).
#   4. Remove the old entry from this Secret. Commit + push + sync.
#
# Promotion to ExternalSecret backed by 1Password Connect tracks the
# same followup as duitku.duitku.FIREFLY_PAT, firefly.APP_KEY, and
# plane.SECRET_KEY. Migrate together when ready.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-api-key
  namespace: duitku
  labels:
    app.kubernetes.io/name: duitku
    app.kubernetes.io/component: api-key-auth
type: Opaque
stringData:
  # Client: Cloudflare Email Worker invoking duitku-inbox.
  # Set the same value in the Worker via
  #   wrangler secret put GATEWAY_API_KEY
  # before deploying the Worker.
  cf-worker: E6xlgH329xPv67wgUauZ_nR0DYGe7ju44yJDP1EH6QY
