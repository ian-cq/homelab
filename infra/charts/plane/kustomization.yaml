apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plane

resources:
  - httproute.yaml

helmCharts:
  - name: plane-ce
    repo: https://helm.plane.so/
    version: 1.5.1
    releaseName: plane
    namespace: plane
    valuesFile: values.yaml
    includeCRDs: false

# Override the chart-rendered plane-app-vars ConfigMap to set WEB_URL to
# the https:// origin (the chart hardcodes http://). See patch file for
# rationale.
patches:
  - path: patch-web-url.yaml
    target:
      kind: ConfigMap
      name: plane-app-vars
