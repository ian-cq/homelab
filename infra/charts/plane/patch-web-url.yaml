# Patch the plane-app-vars ConfigMap to override / inject base URLs.
#
# 1. WEB_URL
#    Upstream chart hardcodes WEB_URL to "http://{{ .Values.ingress.appHost }}"
#    (see templates/config-secrets/app-env.yaml). Behind a Gateway terminating
#    TLS we need https:// so links generated by the API (emails, OAuth
#    callbacks, share URLs) point to the right scheme.
#
# 2. ADMIN_BASE_URL / APP_BASE_URL / SPACE_BASE_URL
#    The upstream chart's plane-app-vars ConfigMap does NOT template these
#    three vars at all. plane-api reads each via os.environ.get(..., None)
#    in /code/plane/settings/common.py and exposes them through
#    GET /api/instances/. When they are null, plane-web falls back to the
#    docker-compose default of constructing "http://${hostname}:3000/<path>/"
#    for the /god-mode admin shell, the workspace app, and the /spaces app.
#    Setting them here makes /api/instances/ return real https URLs so the
#    web client emits correct cross-app links behind the public Gateway.
#    Trailing slashes are intentionally omitted - the API joins paths.
apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-app-vars
  namespace: plane
data:
  WEB_URL: "https://mgmt.62a.quanianitis.com"
  APP_BASE_URL: "https://mgmt.62a.quanianitis.com"
  ADMIN_BASE_URL: "https://mgmt.62a.quanianitis.com/god-mode"
  SPACE_BASE_URL: "https://mgmt.62a.quanianitis.com/spaces"
