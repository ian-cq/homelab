# Patch the plane-app-vars ConfigMap to set WEB_URL to https://.
#
# Upstream chart hardcodes WEB_URL to "http://{{ .Values.ingress.appHost }}"
# (see templates/config-secrets/app-env.yaml). Behind a Gateway terminating
# TLS we need https:// so links generated by the API (emails, OAuth
# callbacks, share URLs) point to the right scheme.
apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-app-vars
  namespace: plane
data:
  WEB_URL: "https://mgmt.62a.quanianitis.com"
