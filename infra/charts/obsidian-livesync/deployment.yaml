apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchdb
  labels:
    app.kubernetes.io/name: obsidian-livesync
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: obsidian-livesync
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obsidian-livesync
    spec:
      securityContext:
        runAsUser: 5984
        runAsGroup: 5984
        fsGroup: 5984
      initContainers:
        - name: copy-config
          image: couchdb:latest
          command: ["sh", "-c", "cp /config-readonly/* /config-writable/"]
          volumeMounts:
            - name: config-readonly
              mountPath: /config-readonly
            - name: config
              mountPath: /config-writable
      containers:
        - name: couchdb
          image: couchdb:latest
          ports:
            - name: http
              containerPort: 5984
              protocol: TCP
          env:
            - name: COUCHDB_USER
              value: "admin"
            - name: COUCHDB_PASSWORD
              value: "admin"
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
            - name: config
              mountPath: /opt/couchdb/etc/local.d
          livenessProbe:
            httpGet:
              path: /_up
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_up
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: couchdb-data
        - name: config
          emptyDir: {}
        - name: config-readonly
          configMap:
            name: couchdb-config
            items:
              - key: local.ini
                path: local.ini
