# Secrets for Firefly III + its Postgres.
#
# Generated locally with `openssl rand -hex 16` on 2026-06-28. Rotate by
# editing here (sync will re-create the Secret; pods need to be rolled
# to pick up new values). These should eventually move to 1Password via
# external-secrets; tracked as a followup, mirroring the plane setup.
#
# - APP_KEY: 32-char hex. Firefly III requires exactly 32 chars; do not
#   change after first boot unless you also re-encrypt the upload disk.
# - STATIC_CRON_TOKEN: 32-char hex consumed by the CronJob to authenticate
#   to /api/v1/cron/<token>. Must match between firefly env and cron.
# - POSTGRES_PASSWORD: postgres superuser & app-user password (single-user
#   DB; we don't bother separating roles for a personal-finance app).
apiVersion: v1
kind: Secret
metadata:
  name: firefly-app
  labels:
    app.kubernetes.io/name: firefly-iii
type: Opaque
stringData:
  APP_KEY: "46d2ea3e4afa53731b2a3aabc8f4b0d9"
  STATIC_CRON_TOKEN: "3475d58adda6fc4cd7a28f4281548db0"
  DB_PASSWORD: "7377a3c6fafb0de9d39bc8cb579aef9d"
---
apiVersion: v1
kind: Secret
metadata:
  name: firefly-postgres
  labels:
    app.kubernetes.io/name: firefly-iii
type: Opaque
stringData:
  POSTGRES_DB: "firefly"
  POSTGRES_USER: "firefly"
  POSTGRES_PASSWORD: "7377a3c6fafb0de9d39bc8cb579aef9d"
