# Envoy Gateway SecurityPolicy: Google OIDC for the entire public Gateway.
#
# Why one policy instead of per-HTTPRoute:
#   SecurityPolicy.targetRefs is namespace-local (LocalPolicyTarget-
#   ReferenceWithSectionName), so a SecurityPolicy targeting HTTPRoutes
#   would have to live in each route's namespace (argocd, monitoring,
#   plane, ...). Targeting the Gateway resource (which is itself in
#   the `gateway` namespace) applies the OIDC filter to every listener
#   on the Gateway, transparently covering every HTTPRoute attached to
#   it -- current and future. One policy, one Secret, no per-namespace
#   plumbing.
#
# Centralized callback: `redirectURL` is pinned to
#   https://auth.62a.quanianitis.com/oauth2/callback
# regardless of which protected subdomain initiated the flow. After
# Google redirects the user back to auth.62a/oauth2/callback, Envoy's
# OIDC filter completes the token exchange, sets a session cookie
# scoped to `62a.quanianitis.com` (so every subdomain inherits it),
# reads the original URL out of the OAuth `state` parameter, and 302s
# the user back where they started. The browser then sends the
# shared cookie to e.g. grafana.62a, the filter validates, and the
# request reaches the backend.
#
# Only one redirect URI needs to be registered in the Google OAuth 2.0
# Client's Authorized redirect URIs list:
#   https://auth.62a.quanianitis.com/oauth2/callback
# Adding new protected hostnames in future requires NO Google Console
# changes -- they all funnel through auth.62a.
#
# Hosts covered today (all parented to gateway/public):
#   - argocd.62a.quanianitis.com
#   - grafana.62a.quanianitis.com
#   - prometheus.62a.quanianitis.com
#   - kubernetes.62a.quanianitis.com
#   - mgmt.62a.quanianitis.com         (once plane is bootstrapped)
#
# auth.62a.quanianitis.com is a synthetic host: it has no backend, just
# an HTTPRoute (auth-callback.yaml in this directory) that exists to
# make Envoy accept the hostname at the listener. The OIDC filter
# intercepts /oauth2/callback before the route's backend is reached.
#
# Secret: `google-oauth-client` in this namespace. Created out-of-band
# (kubectl apply, NOT in git) so the client_secret never lands in the
# repo. Keys: `client-id`, `client-secret`. To re-create after a
# disaster, copy from `monitoring/google-oauth-client` or rebuild from
# the Google Cloud Console download.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: public-oidc
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      # No sectionName: apply to all listeners (we currently have one,
      # the wildcard HTTPS listener, but this keeps the policy general).
  oidc:
    provider:
      issuer: https://accounts.google.com
    clientIDRef:
      name: google-oauth-client
    clientSecret:
      name: google-oauth-client
    redirectURL: https://auth.62a.quanianitis.com/oauth2/callback
    # Share the session cookie across every *.62a.quanianitis.com host
    # so a single Google login authorises all protected subdomains.
    cookieDomain: 62a.quanianitis.com
    logoutPath: /logout
    scopes:
      - openid
      - email
      - profile
