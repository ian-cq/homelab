# Shared API key for the `inbox` listener of Gateway `public`.
#
# Any HTTPRoute that attaches via `parentRefs[].sectionName: inbox`
# inherits the `inbox-apikey` SecurityPolicy (see
# securitypolicy-inbox.yaml), which references this Secret. The
# listener's hostname is inbox.62a.quanianitis.com - so this key
# authenticates ALL machine-to-machine callers on that hostname
# (today: the Cloudflare Email Worker driving duitku; tomorrow:
# whatever else lands on inbox.62a).
#
# Format: each `stringData` key is a client identity. Envoy logs the
# matched name and forwards it to the upstream as the `x-client-id`
# request header (see SecurityPolicy.apiKeyAuth.forwardClientIDHeader).
# Add new clients as new entries; remove on rotation.
#
# Namespace: lives in `gateway` ns alongside the SecurityPolicy that
# consumes it. Envoy Gateway v1.5.x requires apiKeyAuth.credentialRefs
# to be same-namespace as the SecurityPolicy (cross-namespace via
# ReferenceGrant is not honored until v1.8.0, fixed by validateSecretRef
# flipping from `false` to `true` in
# internal/gatewayapi/securitypolicy.go:buildAPIKeyAuth). Co-locating
# the Secret with the SP avoids that pitfall entirely and lets a single
# Secret serve every future inbox-listener consumer without per-tenant
# duplication.
#
# Rotation:
#   1. Mint a new key:
#        python3 -c 'import secrets; print(secrets.token_urlsafe(32))'
#   2. Add a SECOND entry to stringData with the new key (don't remove
#      the old one yet). Commit + push + let Argo sync.
#   3. Update each consumer to send the new key. For the CF Worker:
#        wrangler secret put GATEWAY_API_KEY
#      Verify in EG access logs that x-client-id reflects the new name.
#   4. Remove the old entry. Commit + push + sync.
#
# Promotion to ExternalSecret backed by 1Password Connect tracks the
# same followup as FIREFLY_PAT, firefly.APP_KEY, plane.SECRET_KEY, etc.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-api-key
  namespace: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api-key-auth
type: Opaque
stringData:
  # Client: Cloudflare Email Worker, posting routed bank statements
  # to inbox.62a.quanianitis.com (currently /cf-inbox on the duitku
  # webhook). Set the same value in the Worker via:
  #   wrangler secret put GATEWAY_API_KEY
  cf-worker: E6xlgH329xPv67wgUauZ_nR0DYGe7ju44yJDP1EH6QY
