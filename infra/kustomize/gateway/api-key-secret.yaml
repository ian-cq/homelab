# Shared API key for *.62a.quanianitis.com routes that bypass the
# Gateway-wide `public-oidc` SecurityPolicy (currently: duitku-inbox).
#
# The Cloudflare Email Worker — and any future machine-to-machine
# caller of an OIDC-exempt route — presents this key in the
# `X-API-Key` request header. Envoy Gateway's apiKeyAuth filter
# rejects requests at L7 before they reach the upstream pod, so the
# pod's per-request CPU budget is only spent on authenticated
# traffic.
#
# Format: each `data` key is a client identity that Envoy logs and
# can forward to the upstream via the
# SecurityPolicy.apiKeyAuth.forwardClientIDHeader knob. Add new
# clients as new entries here; the matched client's key name is what
# shows up in EG access logs as `client_id`.
#
# Rotation:
#   1. Mint a new key (`python3 -c "import secrets;
#      print(secrets.token_urlsafe(32))"`).
#   2. Add a SECOND entry to this Secret with the new key (don't
#      remove the old one yet). Commit + push + Argo sync.
#   3. Update the consumer (`wrangler secret put GATEWAY_API_KEY` for
#      the CF Worker) to use the new key. Verify traffic with the new
#      key is being accepted.
#   4. Remove the old entry from this Secret. Commit + push + sync.
#
# Cross-namespace references from SecurityPolicy resources in other
# namespaces are gated by the ReferenceGrant in this same directory
# (api-key-referencegrant.yaml).
#
# This is a Secret today, not an ExternalSecret pointing at 1Password,
# matching the same followup tracked for `duitku.WEBHOOK_HMAC_KEY`,
# `firefly.APP_KEY`, and `plane.SECRET_KEY`. Promotion to
# ExternalSecret happens once all four are migrated together.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-api-key
  namespace: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api-key-auth
type: Opaque
stringData:
  # Client: Cloudflare Email Worker invoking duitku-inbox.
  # Set the same value in the Worker via `wrangler secret put
  # GATEWAY_API_KEY` before deploying the Worker.
  cf-worker: E6xlgH329xPv67wgUauZ_nR0DYGe7ju44yJDP1EH6QY
