apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-62a-quanianitis-com
  namespace: gateway
spec:
  secretName: wildcard-62a-quanianitis-com-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.62a.quanianitis.com"
  dnsNames:
    - "*.62a.quanianitis.com"
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
