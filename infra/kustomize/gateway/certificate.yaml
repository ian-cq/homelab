# Wildcard TLS certificate for *.62a.quanianitis.com.
#
# Issued by the letsencrypt-prod ClusterIssuer (DNS-01 via Cloudflare
# API token in kube-system/62a-quanianitis-com-cloudflare-api).
#
# Lives in `gateway` next to the Gateway so the Gateway can reference
# the resulting Secret without a ReferenceGrant.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-62a-quanianitis-com
  namespace: gateway
spec:
  secretName: wildcard-62a-quanianitis-com-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.62a.quanianitis.com"
  dnsNames:
    - "*.62a.quanianitis.com"
  duration: 2160h    # 90d
  renewBefore: 360h  # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
