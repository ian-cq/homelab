apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared Cilium Gateway for all *.62a.quanianitis.com hostnames.
# TLS is terminated here using cert-manager-issued Let's Encrypt certs
# whose Secrets live in the apps' own namespaces (argocd, monitoring);
# cross-namespace Secret refs are permitted via ReferenceGrants in each
# of those namespaces.
#
# The HTTPRoutes themselves live next to their backing Services
# (infra/kustomize/<app>/httproute.yaml) so they can backendRef the
# Service in the same namespace without further grants.

namespace: gateway

resources:
  - tlsroute-crd.yaml
  - gateway.yaml
