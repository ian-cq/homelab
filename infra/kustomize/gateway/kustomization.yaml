apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared Cilium Gateway for all *.62a.quanianitis.com hostnames.
# TLS is terminated here using a single wildcard Let's Encrypt cert
# (Certificate + Secret colocated in cilium-system with the Gateway,
# so no ReferenceGrant is needed for the cert ref).
#
# The HTTPRoutes themselves live next to their backing Services
# (infra/kustomize/<app>/httproute.yaml) so they can backendRef the
# Service in the same namespace without further grants.
#
# No `namespace:` override here: gateway.yaml and certificate.yaml each
# carry an explicit metadata.namespace, and tlsroute-crd.yaml is
# cluster-scoped.

resources:
  - tlsroute-crd.yaml
  - gateway.yaml
  - certificate.yaml
