apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared Cilium Gateway for all *.62a.quanianitis.com hostnames.
#
# Architecture:
#   - One wildcard TLS listener (*.62a.quanianitis.com) on port 443.
#   - Wildcard Certificate + Secret live in cilium-system next to the
#     Gateway, so no ReferenceGrant is needed for the TLS cert ref.
#   - HTTPRoutes live next to their backing Services in app namespaces
#     (argocd, monitoring). They parentRef this Gateway across
#     namespaces (ParentRef cross-ns is governed by the Gateway's
#     allowedRoutes selector, NOT by ReferenceGrant). BackendRefs are
#     same-ns, so no ReferenceGrant is needed for routes either.
#   - The set of Route-source namespaces is pinned by the listener's
#     allowedRoutes selector (argocd, monitoring); add to gateway.yaml
#     when introducing a new public app namespace.
#
# All resources here are namespaced into cilium-system.

namespace: cilium-system

resources:
  - certificate.yaml
  - gateway.yaml
  - gatewayclass.yaml
