# ReferenceGrant: allow SecurityPolicy resources in any non-OIDC
# consumer namespace to reference the shared `gateway-api-key` Secret
# in the `gateway` namespace via apiKeyAuth.credentialRefs.
#
# Gateway API requires an explicit ReferenceGrant for any
# cross-namespace object reference. Without this, an EG SecurityPolicy
# in (e.g.) the `duitku` namespace that does:
#
#     apiKeyAuth:
#       credentialRefs:
#         - kind: Secret
#           name: gateway-api-key
#           namespace: gateway    # <-- cross-namespace
#
# would be rejected by the EG admission webhook with a
# RefNotPermitted condition.
#
# Add new consumer namespaces under `spec.to[0].namespace` as new
# OIDC-exempt routes are added in other namespaces. Today the only
# consumer is `duitku`.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: gateway-api-key-to-consumers
  namespace: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api-key-auth
spec:
  # Allow these subjects (in their own namespaces) to reference...
  from:
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: duitku
  # ...this kind of object in our (gateway) namespace.
  to:
    - group: ""
      kind: Secret
      name: gateway-api-key
