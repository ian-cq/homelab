# Two listeners share port 443 with distinct hostnames. Per Gateway-API,
# more-specific hostname wins at request dispatch, so a request to
# inbox.62a.quanianitis.com hits the `inbox` listener (not the wildcard).
#
# Each listener has its own SecurityPolicy:
#   - https  ← public-oidc (Google OIDC + email allowlist)  [gateway-wide SP]
#   - inbox  ← inbox-apikey (X-API-Key header)              [sectionName-scoped SP]
#
# EG resolves SecurityPolicy specificity as listener > gateway, so the
# inbox listener's apiKeyAuth overrides the gateway-wide OIDC for routes
# attached via parentRefs[].sectionName: inbox. The public-oidc policy
# gets a `PolicyConditionOverridden: true` status for [inbox] - that's
# expected, not a bug.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public
  namespace: gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.62a.quanianitis.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: wildcard-62a-quanianitis-com-tls
      allowedRoutes:
        namespaces:
          from: All
    # Dedicated listener for machine-to-machine webhooks that can't
    # present a Google OIDC JWT (e.g. Cloudflare Email Workers).
    # Routes attach via `parentRefs[].sectionName: inbox` and inherit
    # the inbox-apikey SecurityPolicy. TLS reuses the wildcard cert
    # since `*.62a` covers `inbox.62a`.
    - name: inbox
      protocol: HTTPS
      port: 443
      hostname: "inbox.62a.quanianitis.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: wildcard-62a-quanianitis-com-tls
      allowedRoutes:
        namespaces:
          from: All
