# CUDA smoke test pod — requests 1 GPU, runs nvidia-smi
# Usage: kubectl apply -f infra/kustomize/nvidia-device-plugin/cuda-test-pod.yaml
#        kubectl logs cuda-smi
#        kubectl delete pod cuda-smi
apiVersion: v1
kind: Pod
metadata:
  name: cuda-smi
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: cuda-smi
      image: nvidia/cuda:12.4.1-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: "1"
