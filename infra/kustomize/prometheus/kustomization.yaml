apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - namespace.yaml
  - certificate.yaml
  - httproute.yaml

helmCharts:
  - name: prometheus
    repo: https://prometheus-community.github.io/helm-charts
    version: 25.27.0
    releaseName: prometheus
    namespace: monitoring
    valuesFile: values.yaml
