apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  # namespace.yaml intentionally omitted: the `monitoring` Namespace is owned by
  # the central namespaces Application (infra/kustomize/namespaces). Listing it
  # here too caused a SharedResourceWarning and kept the namespaces app
  # perpetually OutOfSync. CreateNamespace=true on this Application's
  # syncPolicy still ensures the namespace exists if the central app hasn't
  # applied yet.
  - certificate.yaml
  # httproute.yaml intentionally omitted: prometheus is NOT exposed via the
  # public Gateway / frpc tunnel. Ian's policy is that any host whose
  # /oauth2/callback URI is not registered in Google Console must not be
  # reachable via the external (VPS → frp → cluster) path. The prometheus
  # callback URI is intentionally NOT in Google Console, so the public
  # HTTPRoute is dropped. Access prometheus in-cluster only:
  #   kubectl -n monitoring port-forward svc/prometheus-server 9090:80
  # or via grafana (which has its OWN OIDC + its own prometheus datasource).
  # If you ever want to re-expose, restore httproute.yaml AND add
  # https://prometheus.62a.quanianitis.com/oauth2/callback to the Google
  # Console redirect URI list for client_id 114204026619-…

helmCharts:
  - name: prometheus
    repo: https://prometheus-community.github.io/helm-charts
    version: 25.27.0
    releaseName: prometheus
    namespace: monitoring
    valuesFile: values.yaml
