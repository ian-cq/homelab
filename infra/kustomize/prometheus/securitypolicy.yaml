apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: prometheus-oidc
  namespace: monitoring
spec:
  # targetRefs is namespace-local (LocalPolicyTargetReferenceWithSectionName),
  # so this SecurityPolicy must live in the same namespace as the HTTPRoute it
  # protects. Envoy Gateway applies the OIDC filter at the gateway data plane
  # for every request that matches this HTTPRoute.
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: prometheus
  oidc:
    provider:
      # Google OIDC discovery doc lives at
      # https://accounts.google.com/.well-known/openid-configuration
      # so we only need the issuer URL; Envoy Gateway will fetch the rest.
      issuer: https://accounts.google.com
    clientIDRef:
      name: google-oauth-client
      # Secret lives in the same namespace; namespace field omitted.
    clientSecret:
      name: google-oauth-client
    # Per-host redirect URL. Ian must register
    #   https://prometheus.62a.quanianitis.com/oauth2/callback
    # in the Google OAuth client's "Authorized redirect URIs" list before this
    # works. The Envoy Gateway default template would do the same thing, but
    # spelling it out keeps the contract explicit.
    redirectURL: https://prometheus.62a.quanianitis.com/oauth2/callback
    logoutPath: /logout
    scopes:
      - openid
      - email
      - profile
