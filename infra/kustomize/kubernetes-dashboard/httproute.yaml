apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-dashboard
  namespace: monitoring
spec:
  parentRefs:
    - name: public
      namespace: gateway
  hostnames:
    - kubernetes.62a.quanianitis.com
  rules:
    - filters:
        # Inject `Authorization: Bearer <admin-user-token>` so the
        # dashboard's token login screen is auto-skipped. See
        # credential-injection.yaml for the full rationale.
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: dashboard-bearer
      backendRefs:
        - name: kubernetes-dashboard
          port: 80
