# Auto-skip the dashboard login screen by injecting an Authorization
# header on every request that hits the kubernetes-dashboard HTTPRoute.
#
# Why this works:
#   v2.7.0 of the dashboard checks for an `Authorization: Bearer ...`
#   header before showing its token/kubeconfig login view. When the
#   header is present and valid, it bypasses the login screen entirely
#   and authenticates the session as the bearer-token subject.
#
# Security posture:
#   External access to kubernetes.62a.quanianitis.com is already gated
#   by the Gateway-wide Google OIDC SecurityPolicy (gateway/public-oidc).
#   Only Ian's Google account can reach the dashboard from the public
#   internet. The injected bearer is admin-user (cluster-admin) -- once
#   you're past OIDC you get full cluster access. This is intentional
#   for a single-user homelab.
#
# Secret `dashboard-bearer-credential` is bootstrapped out-of-band
# (see admin-user-monitoring.yaml header comment) so the actual JWT
# never lands in git. Same pattern as `google-oauth-client` in the
# gateway namespace.
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: dashboard-bearer
  namespace: monitoring
spec:
  credentialInjection:
    # `overwrite: true` makes envoy clobber any incoming Authorization
    # header the user-agent might send. We always want the admin-user
    # token, never whatever the browser cached.
    overwrite: true
    credential:
      valueRef:
        group: ""
        kind: Secret
        name: dashboard-bearer-credential
