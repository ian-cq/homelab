# ServiceAccount + cluster-admin binding + long-lived token Secret used to
# log in to the Kubernetes Dashboard at https://dashboard.62a.quanianitis.com/.
#
# Lives in the `monitoring` namespace because the dashboard Helm release
# was installed there (see values-override.yaml).
#
# Apply with:
#   kubectl apply -f infra/kustomize/kubernetes-dashboard/admin-user-monitoring.yaml
#
# Retrieve the login token with:
#   kubectl -n monitoring get secret admin-user-token \
#     -o go-template='{{ .data.token | base64decode }}'
#
# Out-of-band bootstrap for the envoy credential-injection Secret
# (so the gateway can auto-skip the dashboard's login screen):
#
#   TOKEN=$(kubectl -n monitoring get secret admin-user-token \
#     -o go-template='{{ .data.token | base64decode }}')
#   kubectl -n monitoring create secret generic dashboard-bearer-credential \
#     --from-literal=credential="Bearer ${TOKEN}" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Re-run after the SA's token-controller rotates the JWT, or whenever
# the admin-user-token Secret is recreated. The injected value is the
# entire header value including the literal `Bearer ` prefix.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-user
  namespace: monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-user-token
  namespace: monitoring
  annotations:
    kubernetes.io/service-account.name: admin-user
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-user-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: admin-user
  namespace: monitoring
