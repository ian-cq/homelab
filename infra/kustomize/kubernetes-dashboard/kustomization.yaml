apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single-container Kubernetes Dashboard v2.7.0 deployed into the
# `monitoring` namespace. No kong gateway, no separate auth pod —
# the dashboard binary serves both UI and API itself.
#
# Sibling files `values.yaml`, `sa.yaml`, `secret.yaml` and
# `clusterrolebinding.yaml` are leftovers from an earlier (never-applied)
# chart-based attempt that targeted the `kubernetes-dashboard` namespace.
# They are intentionally NOT referenced here.

namespace: monitoring

resources:
  - dashboard-monitoring.yaml
  - admin-user-monitoring.yaml
  - certificate.yaml
  - httproute.yaml
