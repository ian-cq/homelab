apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single-container Kubernetes Dashboard v2.7.0 deployed into the
# `monitoring` namespace. No kong gateway, no separate auth pod —
# the dashboard binary serves both UI and API itself.
#
# The upstream chart-based migration is not viable: the official helm
# repo https://kubernetes.github.io/dashboard/ is dead (GitHub Pages
# 404) and kubernetes/dashboard was archived on 2026-01-21.

namespace: monitoring

resources:
  - dashboard-monitoring.yaml
  - admin-user-monitoring.yaml
  - certificate.yaml
  - httproute.yaml
