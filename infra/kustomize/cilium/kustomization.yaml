apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: the cilium helm chart with gatewayAPI.enabled=true renders the
# `cilium` GatewayClass itself, so we do not author one.

resources:
  # TLSRoute CRD (experimental channel). The homelab does not author any
  # TLSRoute objects, but cilium 1.17.x unconditionally registers
  # `v1alpha2.TLSRouteList` in its client-go scheme; without the CRD,
  # every Gateway reconcile crashes with
  #   `no kind is registered for the type v1alpha2.TLSRouteList in scheme`
  # The cilium helm chart does NOT ship Gateway-API CRDs, so we pin the
  # upstream one by URL. Pinned to gateway-api v1.2.1 (matches the standard
  # channel CRDs already installed cluster-wide).
  - https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.1/config/crd/experimental/gateway.networking.k8s.io_tlsroutes.yaml
  # LB-IPAM pool + L2 announcement for the public Gateway Service. See
  # values.yaml for the l2announcements helm flag that makes the policy
  # actually do anything.
  - lb-pool.yaml
  - l2-announce.yaml

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    version: 1.17.3
    releaseName: cilium
    namespace: cilium-system
    valuesFile: values.yaml
    includeCRDs: true
