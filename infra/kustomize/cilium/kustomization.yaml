apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cilium provides CNI + kube-proxy replacement only. Gateway-API
# controller is now envoy-gateway (gatewayAPI.enabled=false in values.yaml).
# The TLSRoute CRD pin previously here is no longer required — cilium
# only registers v1alpha2.TLSRouteList in its scheme when the gatewayAPI
# feature is enabled. Keep the CRD installed via the gateway-api
# standard bundle that's already cluster-wide.

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    version: 1.17.3
    releaseName: cilium
    namespace: cilium-system
    valuesFile: values.yaml
    includeCRDs: true
