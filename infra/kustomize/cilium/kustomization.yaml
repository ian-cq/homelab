apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: the cilium helm chart with gatewayAPI.enabled=true renders the
# `cilium` GatewayClass itself, so the sibling gatewayclass.yaml is NOT
# referenced here (kept as documentation / fallback only).

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    version: 1.17.3
    releaseName: cilium
    namespace: kube-system
    valuesFile: values.yaml
    includeCRDs: true
