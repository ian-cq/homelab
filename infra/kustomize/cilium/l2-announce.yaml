# L2 announcement policy for the public Gateway Service.
#
# Tells cilium-agent on the matched node to gratuitously ARP for the
# LoadBalancer IP allocated by the matching CiliumLoadBalancerIPPool, so
# LAN clients can reach the Gateway directly without going through FRP.
#
# Scoped tightly:
#   - serviceSelector: only the public Gateway's Service
#   - nodeSelector:    pinned to quanianitis-01 (defensive; cluster is
#                      single-node today, but this keeps the policy
#                      explicit if a node is ever added)
#   - interfaces:      wlp4s0 only (the LAN interface). Note: wifi.
#                      Works as long as the AP does not enable client
#                      isolation.
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: public-gateway
spec:
  serviceSelector:
    matchLabels:
      io.cilium.gateway/owning-gateway: public
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: quanianitis-01
  interfaces:
    - wlp4s0
  externalIPs: false
  loadBalancerIPs: true
