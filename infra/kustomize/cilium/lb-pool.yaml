# LB-IPAM pool for the public Gateway Service.
#
# Cilium has `enable-lb-ipam: true` by default, but stays idle until a pool
# exists. This pool only matches the Service owned by Gateway
# `cilium-system/public` (label written by cilium-operator), so it cannot
# accidentally allocate an IP to any other LoadBalancer Service.
#
# The range 192.168.1.200-255 is the static-IP block on the homelab LAN
# (DHCP allocates below .200). Currently only one IP is used; the rest are
# headroom for future Gateways.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: public-gateway
spec:
  blocks:
    - start: "192.168.1.200"
      stop: "192.168.1.255"
  serviceSelector:
    matchLabels:
      io.cilium.gateway/owning-gateway: public
