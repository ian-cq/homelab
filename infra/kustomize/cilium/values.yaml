operator:
  replicas: 1

kubeProxyReplacement: true

k8sServiceHost: quanianitis-01
k8sServicePort: 6443

ipam:
  mode: kubernetes

hubble:
  relay:
    enabled: false
  ui:
    enabled: false

# Cilium Gateway API controller. Requires kubeProxyReplacement=true (set above)
# and the standard-channel Gateway API CRDs (already installed cluster-wide).
# Cilium runs Envoy embedded in cilium-agent for the Gateway listeners; no
# separate Envoy DaemonSet is deployed.
gatewayAPI:
  enabled: true

# L2 announcements let cilium-agent ARP-respond on the LAN for LoadBalancer
# service IPs allocated by LB-IPAM (CiliumLoadBalancerIPPool + match policy
# live in this kustomization). The k8sClientRateLimit bump follows the
# upstream guidance: l2announcements uses one Lease per announced service
# and the default client throttle (5/10) churns quickly with even a few
# leases.
l2announcements:
  enabled: true
k8sClientRateLimit:
  qps: 50
  burst: 100
