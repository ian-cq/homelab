operator:
  replicas: 1

kubeProxyReplacement: true

k8sServiceHost: quanianitis-01
k8sServicePort: 6443

ipam:
  mode: kubernetes

hubble:
  relay:
    enabled: false
  ui:
    enabled: false

# Cilium Gateway API controller. Requires kubeProxyReplacement=true (set above)
# and the standard-channel Gateway API CRDs (already installed cluster-wide).
# Cilium runs Envoy embedded in cilium-agent for the Gateway listeners; no
# separate Envoy DaemonSet is deployed.
gatewayAPI:
  enabled: true

# L2 announcements disabled. The CiliumL2AnnouncementPolicy on wlp4s0
# (WiFi) appeared to correlate with envoy upstream-connect timeouts to
# backend pods (503s on every Gateway-routed host). Removed pending a
# better answer for advertising the LB IP on the LAN (BGP, or a wired
# uplink before re-enabling L2).
l2announcements:
  enabled: false

# Use BPF sk_lookup for transparent-proxy delivery to envoy instead of the
# iptables xt_socket fallback. xt_socket appears to mis-route the return
# path of envoy upstream connects on kernel 6.12 (envoy source IP is the
# cilium ingress endpoint 10.42.0.251 which is not bound to any host
# interface and relies on fwmark 0x200 -> table 2004 lo delivery).
# Symptom without this: envoy reports "upstream connect error: connection
# timeout" after 5s on every Gateway-routed host; backend pods are
# healthy and reachable directly.
bpf:
  tproxy: true
