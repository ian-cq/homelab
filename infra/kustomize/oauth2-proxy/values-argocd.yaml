# oauth2-proxy in front of Argo CD UI
# Phase 1: chart deploys; pods will CrashLoopBackOff until the
# `oauth2-proxy-google` Secret exists in this namespace.
# Phase 2: rewire infra/kustomize/argocd/httproute.yaml backendRef →
# oauth2-proxy-argocd.oauth.svc:80

config:
  existingSecret: oauth2-proxy-google
  # configFile fully replaces the chart's default placeholder
  # (upstreams = ["file:///dev/null"]). CLI flags merge ADDITIVELY with
  # the file, which is why we set upstream here instead of extraArgs.
  configFile: |-
    provider = "google"
    reverse_proxy = true
    http_address = "0.0.0.0:4180"
    upstreams = ["http://argocd-server.argocd.svc.cluster.local:80"]
    redirect_url = "https://argocd.62a.quanianitis.com/oauth2/callback"
    cookie_domains = [".62a.quanianitis.com"]
    whitelist_domains = [".62a.quanianitis.com"]
    cookie_samesite = "lax"
    cookie_secure = true
    # TODO(operator): restrict before phase 2.
    # Currently any Google account can sign in.
    email_domains = ["*"]
    pass_authorization_header = true
    pass_access_token = true
    pass_user_headers = true
    set_authorization_header = true
    set_xauthrequest = true
    skip_provider_button = true

service:
  portNumber: 80

# Single replica; the homelab is single-node. HA here would only add
# scheduling noise.
replicaCount: 1

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

ingress:
  enabled: false

# Traffic is routed via Cilium Gateway HTTPRoute (phase 2), not via the
# chart's HTTPRoute resource.
httpRoute:
  enabled: false

serviceMonitor:
  enabled: false

metrics:
  enabled: false
