# ReferenceGrant allowing HTTPRoutes in argocd/ and monitoring/ namespaces
# to backendRef Services in this oauth namespace. Phase 2 of the oauth2-proxy
# rollout depends on this; phase 1 ships it pre-emptively so the rewire
# commit only touches HTTPRoute manifests.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: httproute-to-oauth2-proxy
  namespace: oauth
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: argocd
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: monitoring
  to:
    - group: ""
      kind: Service
