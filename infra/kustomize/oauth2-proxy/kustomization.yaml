apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: oauth

# Phase 2 rewire to colocate oauth2-proxy with each app's HTTPRoute
# is intentionally deferred. The previous ReferenceGrant-based
# cross-namespace design (HTTPRoutes in argocd/monitoring backendRef
# Services in oauth) has been removed because the homelab does not
# use ReferenceGrants; phase 2 needs a redesign (e.g. one oauth2-proxy
# Deployment per consuming namespace).

helmCharts:
  - name: oauth2-proxy
    repo: https://oauth2-proxy.github.io/manifests
    version: 10.7.0
    releaseName: oauth2-proxy-argocd
    namespace: oauth
    valuesFile: values-argocd.yaml
  - name: oauth2-proxy
    repo: https://oauth2-proxy.github.io/manifests
    version: 10.7.0
    releaseName: oauth2-proxy-grafana
    namespace: oauth
    valuesFile: values-grafana.yaml
  - name: oauth2-proxy
    repo: https://oauth2-proxy.github.io/manifests
    version: 10.7.0
    releaseName: oauth2-proxy-prometheus
    namespace: oauth
    valuesFile: values-prometheus.yaml
  - name: oauth2-proxy
    repo: https://oauth2-proxy.github.io/manifests
    version: 10.7.0
    releaseName: oauth2-proxy-kubernetes
    namespace: oauth
    valuesFile: values-kubernetes.yaml
