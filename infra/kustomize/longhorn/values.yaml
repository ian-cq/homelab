defaultSettings:
  # Store data on the 2TB HDD mounted at /data
  defaultDataPath: /data/longhorn
  # Single node - 1 replica is sufficient
  defaultReplicaCount: 1
  # Disable automatic upgrade checks
  upgradeChecker: false
  # Backup to 500GB HDD
  backupTarget: nfs://192.168.1.50:/backup/longhorn

persistence:
  defaultClassReplicaCount: 1
  reclaimPolicy: Retain

ingress:
  enabled: false

service:
  ui:
    type: NodePort
    nodePort: 30980

longhornUI:
  replicas: 1

preUpgradeChecker:
  jobEnabled: false
