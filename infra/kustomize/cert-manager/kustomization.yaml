apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

resources:
  - clusterissuers.yaml

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: v1.17.1
    releaseName: cert-manager
    # Must match the top-level `namespace:` above. The jetstack chart bakes
    # `.Release.Namespace` into the webhook `cert-manager.io/inject-ca-from-secret`
    # annotation; without this, cainjector looks for the CA secret in the wrong
    # namespace and the webhook caBundle stays empty → x509 unknown authority.
    namespace: kube-system
    # Render CRDs from the chart instead of bundling a separate
    # cert-manager.crds.yaml in git. `crds.keep: true` (chart default) prevents
    # accidental deletion of CRDs if the release is uninstalled.
    valuesInline:
      crds:
        enabled: true
